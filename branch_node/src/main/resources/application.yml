spring:
  application:
    name: branch-node
  datasource:
    url: jdbc:postgresql://localhost:5432/latoscana
    username: postgres
    password: admin  # Cambiar según el entorno local
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
